<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pomodoro Flow — An editorial-styled productivity timer.">
    <title>Pomodoro Flow — Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- NAV -->
    <nav class="nav" id="nav">
        <div class="nav-brand">
            <span class="nav-logo">PMD</span>
            <span class="nav-dot"></span>
        </div>
        <span class="nav-title">Pomodoro Flow</span>
        <a href="../" class="nav-tag">← Back</a>
    </nav>

    <!-- MAIN -->
    <main class="main">
        <!-- Left: Timer -->
        <section class="timer-section">
            <div class="timer-mode-bar">
                <button class="mode-btn active" data-mode="focus" id="mode-focus">
                    <span class="mode-num">25</span>
                    <span class="mode-label">Focus</span>
                </button>
                <button class="mode-btn" data-mode="short-break" id="mode-short">
                    <span class="mode-num">05</span>
                    <span class="mode-label">Break</span>
                </button>
                <button class="mode-btn" data-mode="long-break" id="mode-long">
                    <span class="mode-num">15</span>
                    <span class="mode-label">Long</span>
                </button>
            </div>

            <div class="timer-display" id="timer-display">
                <svg class="timer-ring" viewBox="0 0 300 300" id="timer-ring">
                    <circle class="ring-bg" cx="150" cy="150" r="140" />
                    <circle class="ring-progress" cx="150" cy="150" r="140" id="ring-progress" />
                </svg>
                <div class="timer-inner">
                    <div class="timer-time" id="timer-time">25:00</div>
                    <div class="timer-status" id="timer-status">Ready</div>
                </div>
            </div>

            <div class="timer-controls">
                <button class="ctrl-btn ctrl-secondary" id="btn-reset" title="Reset (R)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-12.36L1 10"/></svg>
                </button>
                <button class="ctrl-btn ctrl-primary" id="btn-start" title="Start/Pause (Space)">
                    <svg class="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <svg class="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button class="ctrl-btn ctrl-secondary" id="btn-skip" title="Skip (S)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
                </button>
            </div>
        </section>

        <!-- Right: Info -->
        <section class="info-section">
            <div class="info-block">
                <h2 class="info-title">Today's<br><em>Progress</em></h2>
                <div class="progress-grid" id="progress-grid">
                    <div class="progress-dot" data-index="0"></div>
                    <div class="progress-dot" data-index="1"></div>
                    <div class="progress-dot" data-index="2"></div>
                    <div class="progress-dot" data-index="3"></div>
                    <div class="progress-dot" data-index="4"></div>
                    <div class="progress-dot" data-index="5"></div>
                    <div class="progress-dot" data-index="6"></div>
                    <div class="progress-dot" data-index="7"></div>
                </div>
                <div class="progress-count">
                    <span id="session-count">0</span>
                    <span class="progress-label">/ 8 sessions</span>
                </div>
            </div>

            <div class="info-block">
                <div class="task-label">Current Task</div>
                <input type="text" id="task-input" class="task-input" placeholder="What are you working on?" maxlength="60">
            </div>

            <div class="info-block shortcuts-block">
                <div class="shortcut-title">Shortcuts</div>
                <div class="shortcut-row"><kbd>Space</kbd><span>Start / Pause</span></div>
                <div class="shortcut-row"><kbd>R</kbd><span>Reset timer</span></div>
                <div class="shortcut-row"><kbd>S</kbd><span>Skip to next</span></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
